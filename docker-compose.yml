version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: borges_db
    environment:
      POSTGRES_USER: borges
      POSTGRES_PASSWORD: borgespassword
      POSTGRES_DB: borges_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://host.docker.internal:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=CLIENT,ERROR,INFO
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://borges:borgespassword@borges_db:5432/borges_os?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - AUTHENTICATION_API_KEY=global-api-key-evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
